<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CertifyIQ — Certification Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
/* ── Reset & Base ──────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:        #0a0e1a;
  --bg2:       #0f1525;
  --bg3:       #151c30;
  --surface:   #1a2340;
  --border:    rgba(255,255,255,0.08);
  --border2:   rgba(255,255,255,0.14);
  --amber:     #f5a623;
  --amber2:    #ffbe55;
  --amber-dim: rgba(245,166,35,0.15);
  --amber-glow:rgba(245,166,35,0.08);
  --teal:      #2dd4bf;
  --teal-dim:  rgba(45,212,191,0.12);
  --red:       #f87171;
  --red-dim:   rgba(248,113,113,0.12);
  --green:     #4ade80;
  --green-dim: rgba(74,222,128,0.12);
  --text:      #e8eaf0;
  --text2:     #8b92a8;
  --text3:     #545c75;
  --radius:    12px;
  --radius-lg: 20px;
  --transition: 200ms cubic-bezier(0.4,0,0.2,1);
}
html { font-size: 16px; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.6;
}

/* ── Ambient background ────────────────────────────────────────────────── */
.ambient {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 80% 50% at 20% -10%, rgba(245,166,35,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 110%, rgba(45,212,191,0.05) 0%, transparent 60%),
    radial-gradient(ellipse 40% 60% at 50% 50%, rgba(15,21,37,0.8) 0%, transparent 100%);
}
.grid-lines {
  position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.025;
  background-image:
    linear-gradient(rgba(255,255,255,0.3) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.3) 1px, transparent 1px);
  background-size: 60px 60px;
}

/* ── Layout wrapper ────────────────────────────────────────────────────── */
#app { position: relative; z-index: 1; min-height: 100vh; }

/* ── Screens ───────────────────────────────────────────────────────────── */
.screen { display: none; min-height: 100vh; }
.screen.active { display: flex; }

/* ══════════════════════════════════════════════════════════════════════════
   LOADING SCREEN
══════════════════════════════════════════════════════════════════════════ */
#screen-loading {
  align-items: center; justify-content: center; flex-direction: column; gap: 20px;
}
.loader-ring {
  width: 56px; height: 56px; border-radius: 50%;
  border: 3px solid var(--border);
  border-top-color: var(--amber);
  animation: spin 0.9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#screen-loading p { color: var(--text2); font-size: 0.9rem; letter-spacing: 0.05em; }

/* ══════════════════════════════════════════════════════════════════════════
   LANDING SCREEN
══════════════════════════════════════════════════════════════════════════ */
#screen-landing {
  flex-direction: column; align-items: center; justify-content: center;
  padding: 40px 20px; gap: 0;
}
.landing-inner {
  max-width: 600px; width: 100%; text-align: center;
  animation: fadeUp 0.6s ease both;
}
@keyframes fadeUp {
  from { opacity:0; transform: translateY(24px); }
  to   { opacity:1; transform: translateY(0); }
}

.badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--amber-dim); border: 1px solid rgba(245,166,35,0.3);
  color: var(--amber); border-radius: 100px; padding: 6px 16px;
  font-size: 0.78rem; font-weight: 500; letter-spacing: 0.08em;
  text-transform: uppercase; margin-bottom: 28px;
}
.badge::before {
  content: ''; width: 6px; height: 6px; background: var(--amber);
  border-radius: 50%; animation: pulse 1.8s ease infinite;
}
@keyframes pulse {
  0%,100% { opacity:1; transform:scale(1); }
  50%      { opacity:0.4; transform:scale(0.6); }
}

.landing-title {
  font-family: 'Syne', sans-serif;
  font-size: clamp(2.4rem, 6vw, 3.8rem);
  font-weight: 800; line-height: 1.1;
  letter-spacing: -0.03em;
  margin-bottom: 20px;
  background: linear-gradient(135deg, #fff 0%, var(--amber2) 60%, var(--amber) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.landing-sub {
  color: var(--text2); font-size: 1.05rem; font-weight: 300;
  max-width: 440px; margin: 0 auto 36px;
  line-height: 1.7;
}

/* ── Quiz info card ────────────────────────────────────────────────────── */
.quiz-card {
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: var(--radius-lg); padding: 28px 32px;
  margin-bottom: 36px; text-align: left;
  position: relative; overflow: hidden;
}
.quiz-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 2px; background: linear-gradient(90deg, var(--amber), var(--teal), transparent);
}
.quiz-card-title {
  font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 700;
  margin-bottom: 16px; color: #fff;
}
.quiz-stats {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
}
.stat-item { text-align: center; }
.stat-val {
  font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800;
  color: var(--amber); display: block;
}
.stat-lbl { font-size: 0.75rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; }

/* ── Difficulty pills ──────────────────────────────────────────────────── */
.diff-row { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }
.diff-pill {
  display: flex; align-items: center; gap: 6px;
  border-radius: 100px; padding: 5px 12px; font-size: 0.78rem; font-weight: 500;
}
.diff-pill.easy   { background: var(--green-dim); color: var(--green); border: 1px solid rgba(74,222,128,0.2); }
.diff-pill.medium { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(245,166,35,0.2); }
.diff-pill.hard   { background: var(--red-dim);   color: var(--red);   border: 1px solid rgba(248,113,113,0.2); }
.diff-dot { width:6px; height:6px; border-radius:50%; background: currentColor; }

/* ── Buttons ───────────────────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 10px;
  border: none; border-radius: var(--radius); cursor: pointer;
  font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: 1rem;
  transition: all var(--transition); text-decoration: none;
}
.btn-primary {
  background: var(--amber); color: #0a0e1a;
  padding: 16px 40px; font-size: 1.05rem; font-weight: 600;
  width: 100%; border-radius: var(--radius-lg);
  box-shadow: 0 0 40px rgba(245,166,35,0.25);
}
.btn-primary:hover {
  background: var(--amber2); transform: translateY(-2px);
  box-shadow: 0 4px 60px rgba(245,166,35,0.4);
}
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.btn-outline {
  background: transparent; color: var(--text2);
  border: 1px solid var(--border2); padding: 10px 20px;
  font-size: 0.9rem; border-radius: var(--radius);
}
.btn-outline:hover { border-color: var(--amber); color: var(--amber); }

/* ── No quiz state ─────────────────────────────────────────────────────── */
.no-quiz {
  background: var(--bg2); border: 1px dashed var(--border2);
  border-radius: var(--radius-lg); padding: 40px; text-align: center;
  margin-bottom: 36px;
}
.no-quiz-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.5; }
.no-quiz h3 { font-family: 'Syne', sans-serif; font-size: 1.1rem; margin-bottom: 8px; }
.no-quiz p  { color: var(--text2); font-size: 0.9rem; line-height: 1.6; }
.code-block {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 18px; margin-top: 16px;
  font-family: monospace; font-size: 0.82rem; color: var(--teal); text-align: left;
  overflow-x: auto; white-space: pre;
}

/* ══════════════════════════════════════════════════════════════════════════
   QUIZ SCREEN
══════════════════════════════════════════════════════════════════════════ */
#screen-quiz {
  flex-direction: column; align-items: center;
  padding: 0; min-height: 100vh;
}

/* ── Header bar ────────────────────────────────────────────────────────── */
.quiz-header {
  width: 100%; background: rgba(10,14,26,0.9);
  backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
  padding: 16px 24px; position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: 16px;
}
.qh-brand { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1rem; color: var(--amber); white-space: nowrap; }
.qh-progress-wrap { flex: 1; }
.qh-progress-label { font-size: 0.72rem; color: var(--text3); display: flex; justify-content: space-between; margin-bottom: 6px; }
.progress-bar { background: var(--border); border-radius: 100px; height: 4px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--amber), var(--amber2)); border-radius: 100px; transition: width 0.4s cubic-bezier(0.4,0,0.2,1); }
.qh-counter {
  font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.85rem;
  color: var(--text2); white-space: nowrap;
}

/* ── Question area ─────────────────────────────────────────────────────── */
.quiz-body {
  flex: 1; width: 100%; max-width: 700px; padding: 36px 24px 60px;
  animation: fadeUp 0.35s ease both;
}

.q-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
.q-num {
  font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.75rem;
  color: var(--amber); text-transform: uppercase; letter-spacing: 0.08em;
}
.q-type-badge {
  font-size: 0.7rem; font-weight: 500; padding: 3px 10px; border-radius: 100px;
  text-transform: uppercase; letter-spacing: 0.05em;
}
.q-type-badge.single   { background: var(--teal-dim); color: var(--teal); }
.q-type-badge.multi    { background: var(--amber-dim); color: var(--amber); }
.q-type-badge.scenario { background: rgba(139,92,246,0.12); color: #a78bfa; }
.q-type-badge.code     { background: rgba(52,211,153,0.12); color: #34d399; }
.q-diff-badge {
  font-size: 0.7rem; font-weight: 500; padding: 3px 10px; border-radius: 100px;
  text-transform: uppercase; letter-spacing: 0.05em; margin-left: auto;
}
.q-diff-badge.easy   { background: var(--green-dim); color: var(--green); }
.q-diff-badge.medium { background: var(--amber-dim); color: var(--amber); }
.q-diff-badge.hard   { background: var(--red-dim);   color: var(--red); }

.question-text {
  font-family: 'Syne', sans-serif; font-size: clamp(1.1rem, 2.5vw, 1.35rem);
  font-weight: 600; line-height: 1.5; color: #fff; margin-bottom: 28px;
}

/* ── Options ───────────────────────────────────────────────────────────── */
.options-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 32px; }

.option {
  display: flex; align-items: flex-start; gap: 14px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 18px;
  cursor: pointer; transition: all var(--transition);
  position: relative; overflow: hidden; user-select: none;
}
.option::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, var(--amber-glow), transparent);
  opacity: 0; transition: opacity var(--transition);
}
.option:hover { border-color: var(--border2); }
.option:hover::before { opacity: 1; }

.option.selected {
  border-color: var(--amber); background: var(--surface);
  box-shadow: 0 0 0 1px var(--amber), inset 0 0 20px rgba(245,166,35,0.06);
}
.option.selected::before { opacity: 1; }

.opt-letter {
  width: 28px; height: 28px; min-width: 28px; border-radius: 6px;
  background: var(--bg3); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Syne', sans-serif; font-size: 0.75rem; font-weight: 700;
  color: var(--text3); transition: all var(--transition); margin-top: 1px;
}
.option.selected .opt-letter {
  background: var(--amber); border-color: var(--amber); color: #0a0e1a;
}
.opt-text { font-size: 0.95rem; color: var(--text); line-height: 1.5; flex: 1; }
.option.selected .opt-text { color: #fff; }

/* ── Multi-select hint ─────────────────────────────────────────────────── */
.multi-hint {
  font-size: 0.78rem; color: var(--text3); margin-bottom: 16px;
  display: flex; align-items: center; gap: 6px;
}
.multi-hint::before { content: '☑'; font-size: 0.9rem; }

/* ── Navigation ────────────────────────────────────────────────────────── */
.quiz-nav { display: flex; gap: 12px; align-items: center; }
.btn-next {
  flex: 1; background: var(--amber); color: #0a0e1a;
  padding: 14px 24px; border-radius: var(--radius);
  font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem;
  box-shadow: 0 0 30px rgba(245,166,35,0.2);
}
.btn-next:hover { background: var(--amber2); box-shadow: 0 0 50px rgba(245,166,35,0.35); }
.btn-next:disabled { opacity: 0.3; cursor: not-allowed; transform: none !important; box-shadow: none; }

/* ── Skip link ─────────────────────────────────────────────────────────── */
.skip-link {
  font-size: 0.8rem; color: var(--text3); text-align: center;
  margin-top: 16px; cursor: pointer; transition: color var(--transition);
}
.skip-link:hover { color: var(--text2); }

/* ══════════════════════════════════════════════════════════════════════════
   RESULTS SCREEN
══════════════════════════════════════════════════════════════════════════ */
#screen-results {
  flex-direction: column; align-items: center;
  padding: 40px 20px; gap: 0;
}
.results-inner { max-width: 680px; width: 100%; animation: fadeUp 0.5s ease both; }

.results-hero { text-align: center; margin-bottom: 40px; }

/* ── Score ring ────────────────────────────────────────────────────────── */
.score-ring-wrap { position: relative; width: 160px; height: 160px; margin: 0 auto 24px; }
.score-ring-svg { transform: rotate(-90deg); }
.score-ring-bg  { fill: none; stroke: var(--border2); stroke-width: 10; }
.score-ring-fill {
  fill: none; stroke-width: 10; stroke-linecap: round;
  stroke-dasharray: 440; stroke-dashoffset: 440;
  transition: stroke-dashoffset 1.4s cubic-bezier(0.4,0,0.2,1);
}
.score-ring-fill.pass { stroke: var(--amber); filter: drop-shadow(0 0 12px rgba(245,166,35,0.5)); }
.score-ring-fill.fail { stroke: var(--red); }
.score-text {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.score-pct {
  font-family: 'Syne', sans-serif; font-size: 2.4rem; font-weight: 800; color: #fff;
}
.score-sub { font-size: 0.7rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; }

.results-verdict {
  font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800;
  margin-bottom: 8px;
}
.results-verdict.pass { color: var(--amber); }
.results-verdict.fail { color: var(--red); }
.results-msg { color: var(--text2); font-size: 0.95rem; }

/* ── Stats grid ────────────────────────────────────────────────────────── */
.results-stats {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 28px;
}
.rstat {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px; text-align: center;
}
.rstat-val {
  font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; display: block; margin-bottom: 4px;
}
.rstat-val.correct { color: var(--green); }
.rstat-val.wrong   { color: var(--red); }
.rstat-val.skip    { color: var(--text3); }
.rstat-lbl { font-size: 0.72rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; }

/* ── Review section ────────────────────────────────────────────────────── */
.review-header {
  font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700;
  color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em;
  margin-bottom: 16px; display: flex; align-items: center; gap: 10px;
}
.review-header::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.review-item {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); margin-bottom: 10px; overflow: hidden;
}
.review-item-header {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 14px 16px; cursor: pointer; transition: background var(--transition);
}
.review-item-header:hover { background: var(--surface); }
.review-icon { font-size: 1rem; flex-shrink: 0; margin-top: 2px; }
.review-q-text { flex: 1; font-size: 0.88rem; color: var(--text); line-height: 1.5; }
.review-chevron { color: var(--text3); font-size: 0.75rem; transition: transform var(--transition); flex-shrink: 0; margin-top: 4px; }
.review-item.open .review-chevron { transform: rotate(180deg); }

.review-body { display: none; padding: 0 16px 16px; }
.review-item.open .review-body { display: block; }

.review-opt {
  display: flex; gap: 10px; align-items: flex-start;
  padding: 8px 10px; border-radius: 8px; margin-bottom: 6px; font-size: 0.85rem;
}
.review-opt.correct-answer { background: var(--green-dim); color: var(--green); }
.review-opt.user-correct   { background: var(--green-dim); color: var(--green); }
.review-opt.user-wrong     { background: var(--red-dim);   color: var(--red); }
.review-opt.neutral        { color: var(--text3); }
.review-opt-letter { font-weight: 700; min-width: 18px; }
.review-explanation {
  background: var(--bg3); border-left: 3px solid var(--amber);
  border-radius: 0 8px 8px 0; padding: 12px 14px;
  font-size: 0.84rem; color: var(--text2); line-height: 1.6;
  margin-top: 8px;
}

/* ── Results footer ────────────────────────────────────────────────────── */
.results-footer { display: flex; gap: 12px; margin-top: 28px; flex-wrap: wrap; }
.results-footer .btn { flex: 1; min-width: 160px; padding: 14px 20px; }

/* ── Toast ─────────────────────────────────────────────────────────────── */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: var(--radius); padding: 12px 20px;
  font-size: 0.88rem; color: var(--text); pointer-events: none;
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.3s;
  opacity: 0; z-index: 9999; white-space: nowrap; max-width: 90vw;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* ── Scrollbar ─────────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 100px; }
::-webkit-scrollbar-thumb:hover { background: var(--amber); }

/* ── Responsive ────────────────────────────────────────────────────────── */
@media (max-width: 480px) {
  .quiz-stats   { grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .results-stats{ grid-template-columns: repeat(3, 1fr); }
  .quiz-card    { padding: 20px; }
  .landing-title{ font-size: 2rem; }
}
</style>
</head>
<body>
<div class="ambient"></div>
<div class="grid-lines"></div>

<div id="app">

  <!-- ── Loading ───────────────────────────────────────────────────────── -->
  <div class="screen active" id="screen-loading">
    <div class="loader-ring"></div>
    <p>Loading quiz data…</p>
  </div>

  <!-- ── Landing ───────────────────────────────────────────────────────── -->
  <div class="screen" id="screen-landing">
    <div class="landing-inner">
      <div class="badge">Certification Assessment</div>
      <h1 class="landing-title" id="landing-title">Ready to get certified?</h1>
      <p class="landing-sub" id="landing-sub">Test your knowledge with an AI-generated, industry-grade certification quiz.</p>

      <div id="quiz-info-area"><!-- filled by JS --></div>

      <button class="btn btn-primary" id="btn-start" onclick="startQuiz()">
        <span>Start Quiz</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>
  </div>

  <!-- ── Quiz ──────────────────────────────────────────────────────────── -->
  <div class="screen" id="screen-quiz">
    <div class="quiz-header">
      <span class="qh-brand">CertifyIQ</span>
      <div class="qh-progress-wrap">
        <div class="qh-progress-label">
          <span id="progress-label">Question 1 of 90</span>
          <span id="progress-pct">0%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      </div>
      <span class="qh-counter" id="q-counter">1 / 90</span>
    </div>

    <div class="quiz-body" id="quiz-body"><!-- filled by JS --></div>
  </div>

  <!-- ── Results ───────────────────────────────────────────────────────── -->
  <div class="screen" id="screen-results">
    <div class="results-inner" id="results-inner"><!-- filled by JS --></div>
  </div>

</div><!-- #app -->

<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════════════════════ */
const LS_QUIZ   = 'certifyiq_quiz';
const LS_STATE  = 'certifyiq_state';

let quiz      = null;   // full quiz object
let questions = [];     // flat array
let state     = {       // session state (persisted)
  current:  0,
  answers:  {},   // { "Q1": ["A"], "Q2": ["B","C"] }
  started:  false,
  finished: false,
};

/* ═══════════════════════════════════════════════════════════════════════════
   SCREEN MANAGEMENT
═══════════════════════════════════════════════════════════════════════════ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

/* ═══════════════════════════════════════════════════════════════════════════
   INIT — fetch quiz, restore state
═══════════════════════════════════════════════════════════════════════════ */
async function init() {
  // Try to restore state first
  const savedState = localStorage.getItem(LS_STATE);
  const savedQuiz  = localStorage.getItem(LS_QUIZ);

  // Try to fetch fresh quiz from server
  try {
    const res  = await fetch('/api/quiz');
    if (res.ok) {
      const data = await res.json();
      if (data?.questions?.length) {
        quiz = data;
        questions = data.questions;
        localStorage.setItem(LS_QUIZ, JSON.stringify(data));
      }
    }
  } catch (e) {
    // Server not reachable or no quiz yet — try localStorage
    if (savedQuiz) {
      try {
        quiz = JSON.parse(savedQuiz);
        questions = quiz.questions || [];
      } catch {}
    }
  }

  // Restore session state if quiz matches
  if (savedState) {
    try { state = { ...state, ...JSON.parse(savedState) }; } catch {}
  }

  // If quiz finished, go straight to results
  if (state.finished && quiz) {
    showScreen('results');
    renderResults();
    return;
  }

  showScreen('landing');
  renderLanding();
}

/* ═══════════════════════════════════════════════════════════════════════════
   LANDING
═══════════════════════════════════════════════════════════════════════════ */
function renderLanding() {
  const area = document.getElementById('quiz-info-area');
  const btn  = document.getElementById('btn-start');

  if (!quiz || !questions.length) {
    area.innerHTML = `
      <div class="no-quiz">
        <div class="no-quiz-icon">📡</div>
        <h3>No quiz loaded yet</h3>
        <p>Send your quiz data from n8n to the webhook endpoint, then refresh this page.</p>
        <div class="code-block">POST http://localhost:3000/webhook/quiz
Content-Type: application/json
Body: { "quiz": { "metadata": {...}, "questions": [...] } }</div>
      </div>`;
    btn.disabled = true;
    return;
  }

  const meta = quiz.metadata || {};
  const title = quiz.title || 'Certification Quiz';
  const total = questions.length;
  const passing = meta.passing_score || 70;
  const dist = meta.difficulty_distribution?.actual || meta.difficulty_distribution?.declared || {};

  document.getElementById('landing-title').textContent = title;
  if (quiz.description) document.getElementById('landing-sub').textContent = quiz.description;

  const diffPills = Object.entries(dist)
    .filter(([,v]) => v > 0)
    .map(([k,v]) => `<span class="diff-pill ${k}"><span class="diff-dot"></span>${v} ${k}</span>`)
    .join('');

  area.innerHTML = `
    <div class="quiz-card">
      <div class="quiz-card-title">${escapeHtml(title)}</div>
      <div class="quiz-stats">
        <div class="stat-item"><span class="stat-val">${total}</span><span class="stat-lbl">Questions</span></div>
        <div class="stat-item"><span class="stat-val">${passing}%</span><span class="stat-lbl">Pass Mark</span></div>
        <div class="stat-item"><span class="stat-val">${meta.time_limit_minutes || '—'}</span><span class="stat-lbl">Minutes</span></div>
      </div>
      ${diffPills ? `<div class="diff-row">${diffPills}</div>` : ''}
    </div>`;

  // If session in-progress, update button text
  if (state.started && !state.finished && Object.keys(state.answers).length > 0) {
    btn.innerHTML = `<span>Resume Quiz</span>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>`;
  }
}

/* ═══════════════════════════════════════════════════════════════════════════
   START / RESUME QUIZ
═══════════════════════════════════════════════════════════════════════════ */
function startQuiz() {
  if (!quiz || !questions.length) return;

  // Reset if previously finished
  if (state.finished) {
    state = { current: 0, answers: {}, started: true, finished: false };
  } else {
    state.started = true;
  }

  saveState();
  showScreen('quiz');
  renderQuestion();
}

/* ═══════════════════════════════════════════════════════════════════════════
   RENDER QUESTION
═══════════════════════════════════════════════════════════════════════════ */
function renderQuestion() {
  const idx = state.current;
  const q   = questions[idx];
  const total = questions.length;
  const pct = Math.round((idx / total) * 100);
  const selected = state.answers[q.question_id] || [];

  // Header progress
  document.getElementById('progress-label').textContent = `Question ${idx + 1} of ${total}`;
  document.getElementById('progress-pct').textContent   = pct + '%';
  document.getElementById('progress-fill').style.width  = pct + '%';
  document.getElementById('q-counter').textContent      = `${idx + 1} / ${total}`;

  // Question type label
  const typeMap = {
    'single-correct': ['single', 'Single Answer'],
    'multi-select':   ['multi',  'Multi Select'],
    'scenario':       ['scenario','Scenario'],
    'code-output':    ['code',   'Code Output'],
  };
  const [typeClass, typeLabel] = typeMap[q.question_type] || ['single', 'Single Answer'];
  const isMulti = q.question_type === 'multi-select';

  const optionsHTML = q.options.map(opt => {
    const isSel = selected.includes(opt.option);
    return `
      <div class="option ${isSel ? 'selected' : ''}" data-opt="${opt.option}" onclick="toggleOption('${q.question_id}','${opt.option}',${isMulti})">
        <span class="opt-letter">${opt.option}</span>
        <span class="opt-text">${escapeHtml(opt.text)}</span>
      </div>`;
  }).join('');

  const isLast = idx === total - 1;

  document.getElementById('quiz-body').innerHTML = `
    <div class="q-meta">
      <span class="q-num">Q${idx + 1}</span>
      <span class="q-type-badge ${typeClass}">${typeLabel}</span>
      <span class="q-diff-badge ${q.difficulty}">${q.difficulty}</span>
    </div>
    <div class="question-text">${escapeHtml(q.question_text)}</div>
    ${isMulti ? '<div class="multi-hint">Select all that apply</div>' : ''}
    <div class="options-list" id="options-list">${optionsHTML}</div>
    <div class="quiz-nav">
      ${idx > 0 ? `<button class="btn btn-outline" onclick="prevQuestion()">← Back</button>` : ''}
      <button class="btn btn-next" id="btn-next" onclick="nextQuestion()" ${selected.length === 0 ? 'disabled' : ''}>
        ${isLast ? 'Finish Quiz →' : 'Next Question →'}
      </button>
    </div>
    <div class="skip-link" onclick="skipQuestion()">Skip this question</div>
  `;

  // Scroll to top of quiz body
  document.getElementById('quiz-body').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/* ═══════════════════════════════════════════════════════════════════════════
   OPTION SELECTION
═══════════════════════════════════════════════════════════════════════════ */
function toggleOption(qid, opt, isMulti) {
  const current = state.answers[qid] || [];

  if (isMulti) {
    if (current.includes(opt)) {
      state.answers[qid] = current.filter(o => o !== opt);
    } else {
      state.answers[qid] = [...current, opt];
    }
  } else {
    state.answers[qid] = [opt];
  }

  saveState();

  // Update option UI
  document.querySelectorAll('.option').forEach(el => {
    el.classList.toggle('selected', state.answers[qid].includes(el.dataset.opt));
  });

  // Enable/disable next button
  const nextBtn = document.getElementById('btn-next');
  if (nextBtn) nextBtn.disabled = state.answers[qid].length === 0;
}

/* ═══════════════════════════════════════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════════════════════════════════════ */
function nextQuestion() {
  const idx   = state.current;
  const total = questions.length;

  if (idx < total - 1) {
    state.current++;
    saveState();
    renderQuestion();
  } else {
    finishQuiz();
  }
}

function prevQuestion() {
  if (state.current > 0) {
    state.current--;
    saveState();
    renderQuestion();
  }
}

function skipQuestion() {
  const q = questions[state.current];
  // Mark as skipped with empty
  if (!state.answers[q.question_id]) state.answers[q.question_id] = [];
  nextQuestion();
}

/* ═══════════════════════════════════════════════════════════════════════════
   FINISH
═══════════════════════════════════════════════════════════════════════════ */
function finishQuiz() {
  state.finished = true;
  saveState();
  showScreen('results');
  renderResults();
}

/* ═══════════════════════════════════════════════════════════════════════════
   RESULTS
═══════════════════════════════════════════════════════════════════════════ */
function renderResults() {
  const total    = questions.length;
  const passing  = quiz?.metadata?.passing_score || 70;

  let correct = 0, wrong = 0, skipped = 0;

  questions.forEach(q => {
    const userAns  = state.answers[q.question_id] || [];
    const corrAns  = q.options.filter(o => o.is_correct).map(o => o.option);
    if (userAns.length === 0) { skipped++; return; }
    const isCorrect = arraysEqual(userAns.sort(), corrAns.sort());
    if (isCorrect) correct++; else wrong++;
  });

  const score    = Math.round((correct / total) * 100);
  const passed   = score >= passing;
  const circumf  = 2 * Math.PI * 70; // r=70

  // Build review HTML
  const reviewHTML = questions.map((q, i) => {
    const userAns = state.answers[q.question_id] || [];
    const corrAns = q.options.filter(o => o.is_correct).map(o => o.option);
    const isCorrect = userAns.length > 0 && arraysEqual(userAns.sort(), corrAns.sort());
    const isSkipped = userAns.length === 0;
    const icon = isSkipped ? '⬜' : isCorrect ? '✅' : '❌';

    const optsHTML = q.options.map(opt => {
      const isCorr = opt.is_correct;
      const isUser = userAns.includes(opt.option);
      let cls = 'neutral';
      if (isCorr && isUser)  cls = 'user-correct';
      else if (isCorr)       cls = 'correct-answer';
      else if (isUser)       cls = 'user-wrong';
      return `<div class="review-opt ${cls}"><span class="review-opt-letter">${opt.option}.</span><span>${escapeHtml(opt.text)}</span></div>`;
    }).join('');

    return `
      <div class="review-item" id="ri-${i}">
        <div class="review-item-header" onclick="toggleReview(${i})">
          <span class="review-icon">${icon}</span>
          <span class="review-q-text">${i+1}. ${escapeHtml(q.question_text)}</span>
          <span class="review-chevron">▼</span>
        </div>
        <div class="review-body">
          ${optsHTML}
          ${q.explanation ? `<div class="review-explanation">💡 ${escapeHtml(q.explanation)}</div>` : ''}
        </div>
      </div>`;
  }).join('');

  document.getElementById('results-inner').innerHTML = `
    <div class="results-hero">
      <div class="score-ring-wrap">
        <svg class="score-ring-svg" width="160" height="160" viewBox="0 0 160 160">
          <circle class="score-ring-bg" cx="80" cy="80" r="70"/>
          <circle class="score-ring-fill ${passed ? 'pass' : 'fail'}" id="ring-fill"
            cx="80" cy="80" r="70"
            stroke-dasharray="${circumf}"
            stroke-dashoffset="${circumf}"/>
        </svg>
        <div class="score-text">
          <span class="score-pct" id="score-pct-text">0%</span>
          <span class="score-sub">Score</span>
        </div>
      </div>
      <div class="results-verdict ${passed ? 'pass' : 'fail'}">${passed ? '🎉 Certified!' : '📚 Keep Studying'}</div>
      <div class="results-msg">${passed ? `You passed with ${score}%. Minimum required: ${passing}%.` : `You scored ${score}%. You need ${passing}% to pass. Review and retry!`}</div>
    </div>

    <div class="results-stats">
      <div class="rstat"><span class="rstat-val correct">${correct}</span><span class="rstat-lbl">Correct</span></div>
      <div class="rstat"><span class="rstat-val wrong">${wrong}</span><span class="rstat-lbl">Wrong</span></div>
      <div class="rstat"><span class="rstat-val skip">${skipped}</span><span class="rstat-lbl">Skipped</span></div>
    </div>

    <div class="review-header">Question Review</div>
    ${reviewHTML}

    <div class="results-footer">
      <button class="btn btn-outline" onclick="retakeQuiz()">Retake Quiz</button>
      <button class="btn btn-primary" onclick="goHome()">Back to Home</button>
    </div>
  `;

  // Animate ring after render
  requestAnimationFrame(() => {
    const offset = circumf - (score / 100) * circumf;
    setTimeout(() => {
      document.getElementById('ring-fill').style.strokeDashoffset = offset;
      animateCount('score-pct-text', 0, score, 1400, '%');
    }, 100);
  });
}

function toggleReview(i) {
  const item = document.getElementById('ri-' + i);
  item.classList.toggle('open');
}

function animateCount(id, from, to, dur, suffix) {
  const el = document.getElementById(id);
  if (!el) return;
  const start = performance.now();
  function step(now) {
    const t = Math.min((now - start) / dur, 1);
    const ease = 1 - Math.pow(1 - t, 3);
    el.textContent = Math.round(from + (to - from) * ease) + (suffix || '');
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function retakeQuiz() {
  state = { current: 0, answers: {}, started: true, finished: false };
  saveState();
  showScreen('quiz');
  renderQuestion();
}

function goHome() {
  state = { current: 0, answers: {}, started: false, finished: false };
  saveState();
  showScreen('landing');
  renderLanding();
}

/* ═══════════════════════════════════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════════════════════════════════ */
function saveState() {
  localStorage.setItem(LS_STATE, JSON.stringify(state));
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function arraysEqual(a, b) {
  return a.length === b.length && a.every((v, i) => v === b[i]);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

/* ── Start ─────────────────────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', init);
</script>
